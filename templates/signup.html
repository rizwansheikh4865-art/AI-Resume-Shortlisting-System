{% extends "base.html" %}

{% block title %}Sign Up - AIHIGH{% endblock %}

{% block content %}
<section class="auth-section">
    <div class="container auth-wrapper">
        <div class="auth-card glass-card fade-in-up">
            <div class="auth-header">
                <span class="badge">Create Account</span>
                <h1>Join AIHIGH</h1>
                <p>Create your account to access the AI-powered resume shortlisting system.</p>
            </div>

            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input
                        type="text"
                        id="full_name"
                        name="full_name"
                        placeholder="Enter your full name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Choose a username"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Create a password"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        placeholder="Re-enter your password"
                        required
                    >
                </div>

                <button type="submit" class="primary-btn full-width-btn">Create Account</button>
            </form>

            <div class="demo-credentials">
                <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
            </div>
        </div>
    </div>
</section>
{% endblock %}
